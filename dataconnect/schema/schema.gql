# Vehicle Vitals schema for managing vehicles and maintenance records

# User table is keyed by Firebase Auth UID.
type User @table {
  # `@default(expr: "auth.uid")` sets it to Firebase Auth UID during insert and upsert.
  id: String! @default(expr: "auth.uid")
  email: String! @col(dataType: "varchar(255)")
  displayName: String @col(dataType: "varchar(100)")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Vehicle table keyed by VIN
type Vehicle @table(key: ["vin"]) {
  vin: String! @col(dataType: "varchar(17)")  # VIN is exactly 17 characters
  user: User!
  make: String! @col(dataType: "varchar(50)")
  model: String! @col(dataType: "varchar(50)")
  year: String! @col(dataType: "varchar(4)")
  mileage: String @col(dataType: "varchar(20)")
  purchaseDate: Date
  nextDueByMiles: String @col(dataType: "varchar(20)")
  nextDueByDate: Date
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Maintenance records for vehicles
type MaintenanceRecord @table {
  id: UUID! @default(expr: "uuidV4()")
  vehicle: Vehicle!
  user: User!
  serviceType: String! @col(dataType: "varchar(100)")
  description: String!
  date: Date!
  mileage: String @col(dataType: "varchar(20)")
  cost: Float
  provider: String @col(dataType: "varchar(100)")
  notes: String
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Maintenance schedule templates
type MaintenanceSchedule @table {
  id: UUID! @default(expr: "uuidV4()")
  serviceType: String! @col(dataType: "varchar(100)")
  intervalMiles: Int
  intervalMonths: Int
  description: String!
  priority: String! @col(dataType: "varchar(10)")  # 'high', 'medium', 'low'
}

# Reminders for upcoming maintenance
type Reminder @table {
  id: UUID! @default(expr: "uuidV4()")
  vehicle: Vehicle!
  user: User!
  serviceType: String! @col(dataType: "varchar(100)")
  dueDate: Date
  dueMileage: String @col(dataType: "varchar(20)")
  description: String!
  isCompleted: Boolean! @default(expr: "false")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}
