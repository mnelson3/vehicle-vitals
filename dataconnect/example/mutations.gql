# Vehicle Vitals mutations

# Create or update user profile
mutation UpsertUser($email: String!, $displayName: String) @auth(level: USER) {
  user_upsert(
    data: { id_expr: "auth.uid", email: $email, displayName: $displayName }
  )
}

# Add a new vehicle
mutation AddVehicle(
  $vin: String!
  $make: String!
  $model: String!
  $year: String!
  $mileage: String
  $purchaseDate: Date
  $nextDueByMiles: String
  $nextDueByDate: Date
) @auth(level: USER) {
  vehicle_insert(
    data: {
      vin: $vin
      user: { id_expr: "auth.uid" }
      make: $make
      model: $model
      year: $year
      mileage: $mileage
      purchaseDate: $purchaseDate
      nextDueByMiles: $nextDueByMiles
      nextDueByDate: $nextDueByDate
    }
  )
}

# Update an existing vehicle
mutation UpdateVehicle(
  $vin: String!
  $make: String!
  $model: String!
  $year: String!
  $mileage: String
  $purchaseDate: Date
  $nextDueByMiles: String
  $nextDueByDate: Date
) @auth(level: USER) {
  vehicle_update(
    key: { vin: $vin, user: { id_expr: "auth.uid" } }
    data: {
      make: $make
      model: $model
      year: $year
      mileage: $mileage
      purchaseDate: $purchaseDate
      nextDueByMiles: $nextDueByMiles
      nextDueByDate: $nextDueByDate
    }
  )
}

# Delete a vehicle
mutation DeleteVehicle($vin: String!) @auth(level: USER) {
  vehicle_delete(key: { vin: $vin, user: { id_expr: "auth.uid" } })
}

# Add a maintenance record
mutation AddMaintenanceRecord(
  $vehicleVin: String!
  $serviceType: String!
  $description: String!
  $date: Date!
  $mileage: String
  $cost: Float
  $provider: String
  $notes: String
) @auth(level: USER) {
  maintenanceRecord_insert(
    data: {
      vehicleVin: $vehicleVin
      userId_expr: "auth.uid"
      serviceType: $serviceType
      description: $description
      date: $date
      mileage: $mileage
      cost: $cost
      provider: $provider
      notes: $notes
    }
  )
}

# Update a maintenance record
mutation UpdateMaintenanceRecord(
  $id: UUID!
  $serviceType: String!
  $description: String!
  $date: Date!
  $mileage: String
  $cost: Float
  $provider: String
  $notes: String
) @auth(level: USER) {
  maintenanceRecord_update(
    key: { id: $id }
    data: {
      serviceType: $serviceType
      description: $description
      date: $date
      mileage: $mileage
      cost: $cost
      provider: $provider
      notes: $notes
    }
  )
}

# Delete a maintenance record
mutation DeleteMaintenanceRecord($id: UUID!) @auth(level: USER) {
  maintenanceRecord_delete(key: { id: $id })
}

# Create a reminder
mutation CreateReminder(
  $vehicleVin: String!
  $serviceType: String!
  $dueDate: Date
  $dueMileage: String
  $description: String!
) @auth(level: USER) {
  reminder_insert(
    data: {
      vehicleVin: $vehicleVin
      userId_expr: "auth.uid"
      serviceType: $serviceType
      dueDate: $dueDate
      dueMileage: $dueMileage
      description: $description
    }
  )
}

# Mark reminder as completed
mutation CompleteReminder($id: UUID!) @auth(level: USER) {
  reminder_update(key: { id: $id }, data: { isCompleted: true })
}

# Delete a reminder
mutation DeleteReminder($id: UUID!) @auth(level: USER) {
  reminder_delete(key: { id: $id })
}
