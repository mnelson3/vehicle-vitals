# Vehicle Vitals queries

# List all vehicles for the authenticated user
query ListUserVehicles @auth(level: USER) {
  vehicles(where: { user: { id: { eq_expr: "auth.uid" } } }) {
    vin
    make
    model
    year
    mileage
    purchaseDate
    nextDueByMiles
    nextDueByDate
    createdAt
    updatedAt
  }
}

# Get a specific vehicle by VIN for the authenticated user
query GetVehicleByVin($vin: String!) @auth(level: USER) {
  vehicles(where: { vin: { eq: $vin } }) {
    vin
    make
    model
    year
    mileage
    purchaseDate
    nextDueByMiles
    nextDueByDate
    createdAt
    updatedAt
    user {
      id
    }
    maintenanceRecords: maintenanceRecords_on_vehicle {
      id
      serviceType
      description
      date
      mileage
      cost
      provider
      notes
      createdAt
      updatedAt
    }
  }
}

# List maintenance records for a specific vehicle
query ListMaintenanceRecords($vehicleVin: String!) @auth(level: USER) {
  maintenanceRecords(
    where: {
      _and: [
        { vehicle: { vin: { eq: $vehicleVin } } }
        { user: { id: { eq_expr: "auth.uid" } } }
      ]
    }
    orderBy: { date: DESC }
  ) {
    id
    serviceType
    description
    date
    mileage
    cost
    provider
    notes
    createdAt
    updatedAt
    vehicle {
      vin
      make
      model
      year
    }
  }
}

# Get upcoming reminders for the authenticated user
query ListUpcomingReminders @auth(level: USER) {
  reminders(
    where: {
      _and: [
        { user: { id: { eq_expr: "auth.uid" } } }
        { isCompleted: { eq: false } }
      ]
    }
    orderBy: { dueDate: ASC }
  ) {
    id
    serviceType
    dueDate
    dueMileage
    description
    vehicle {
      vin
      make
      model
      year
    }
  }
}

# Get maintenance schedule templates
query ListMaintenanceSchedules @auth(level: PUBLIC) {
  maintenanceSchedules(orderBy: { serviceType: ASC }) {
    id
    serviceType
    intervalMiles
    intervalMonths
    description
    priority
  }
}

# Get user profile
query GetUserProfile @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    id
    email
    displayName
    createdAt
    updatedAt
  }
}
