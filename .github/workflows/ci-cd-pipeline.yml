name: 🚀 CI/CD Pipeline - Build, Test & Deploy All Deliverables

on:
  push:
    branches: [ main, staging, develop ]
  pull_request:
    branches: [ main, staging, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'STAGING'
        type: choice
        options:
          - PRODUCTION
          - STAGING
          - DEVELOPMENT

env:
  NODE_VERSION: '20'
  FLUTTER_VERSION: '3.35.5'

jobs:
  # 🔍 Determine Environment
  determine-environment:
    name: 🔍 Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should-deploy: ${{ steps.set-env.outputs.should-deploy }}
    steps:
      - name: 📋 Set Environment Variables
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_ENV=$(echo "${{ github.event.inputs.environment }}" | tr '[:upper:]' '[:lower:]')
            echo "environment=$INPUT_ENV" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  # 🔍 Code Quality & Testing
  quality-check:
    name: 🔍 Quality Check & Tests
    runs-on: ubuntu-latest
    needs: determine-environment
    outputs:
      should-deploy: ${{ needs.determine-environment.outputs.should-deploy }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔧 TypeScript Check
        run: npm run check --workspaces --if-present

      - name: 🧪 Run Tests
        run: npm run test --workspaces --if-present

      - name: 🛡️ Security Audit
        run: npm audit --audit-level=high

  # 🏗️ Build All Packages
  build-packages:
    name: 🏗️ Build All Packages
    runs-on: ubuntu-latest
    needs: [determine-environment, quality-check]
    strategy:
      matrix:
        package: ['web', 'shared']
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Create Environment File (Production)
        if: matrix.package == 'web' && needs.determine-environment.outputs.should-deploy == 'true' && needs.determine-environment.outputs.environment == 'production'
        run: |
          cat > packages/web/.env << EOF
          # Production Environment Configuration - Generated from GitHub Secrets

          # Firebase Configuration
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY_PRODUCTION }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_PRODUCTION }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID_PRODUCTION }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_PRODUCTION }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_PRODUCTION }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID_PRODUCTION }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID_PRODUCTION }}

          # Environment
          VITE_ENVIRONMENT=production
          VITE_DEBUG=${{ secrets.VITE_DEBUG_PRODUCTION }}

          # Coming Soon Page Control
          VITE_SHOW_COMING_SOON=${{ secrets.VITE_SHOW_COMING_SOON_PRODUCTION }}

          # Analytics & Monitoring
          VITE_ANALYTICS_ID=${{ secrets.VITE_ANALYTICS_ID_PRODUCTION }}
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN_PRODUCTION }}

          # Third-party Services
          VITE_ADSENSE_CLIENT=${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT=${{ secrets.VITE_ADSENSE_SLOT }}

          # Feature Flags
          VITE_ENABLE_DEBUG_TOOLS=${{ secrets.VITE_ENABLE_DEBUG_TOOLS_PRODUCTION }}
          VITE_ENABLE_ANALYTICS=${{ secrets.VITE_ENABLE_ANALYTICS_PRODUCTION }}
          VITE_ENABLE_ERROR_REPORTING=${{ secrets.VITE_ENABLE_ERROR_REPORTING_PRODUCTION }}
          EOF

      - name: 🔐 Create Environment File (Staging)
        if: matrix.package == 'web' && needs.determine-environment.outputs.should-deploy == 'true' && needs.determine-environment.outputs.environment == 'staging'
        run: |
          cat > packages/web/.env << EOF
          # Staging Environment Configuration - Generated from GitHub Secrets

          # Firebase Configuration
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_STAGING }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID_STAGING }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_STAGING }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID_STAGING }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID_STAGING }}

          # Environment
          VITE_ENVIRONMENT=staging
          VITE_DEBUG=${{ secrets.VITE_DEBUG_STAGING }}

          # Coming Soon Page Control
          VITE_SHOW_COMING_SOON=${{ secrets.VITE_SHOW_COMING_SOON_STAGING }}

          # Environment Access Control
          VITE_STAGING_ACCESS_PASSWORD=${{ secrets.VITE_ACCESS_PASSWORD_STAGING }}

          # Analytics & Monitoring
          VITE_ANALYTICS_ID=${{ secrets.VITE_ANALYTICS_ID_STAGING }}
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN_STAGING }}

          # Third-party Services
          VITE_ADSENSE_CLIENT=${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT=${{ secrets.VITE_ADSENSE_SLOT }}

          # Feature Flags
          VITE_ENABLE_DEBUG_TOOLS=${{ secrets.VITE_ENABLE_DEBUG_TOOLS_STAGING }}
          VITE_ENABLE_ANALYTICS=${{ secrets.VITE_ENABLE_ANALYTICS_STAGING }}
          VITE_ENABLE_ERROR_REPORTING=${{ secrets.VITE_ENABLE_ERROR_REPORTING_STAGING }}
          EOF

      - name: 🔐 Create Environment File (Development)
        if: matrix.package == 'web' && needs.determine-environment.outputs.should-deploy == 'true' && needs.determine-environment.outputs.environment == 'development'
        run: |
          cat > packages/web/.env << EOF
          # Development Environment Configuration - Generated from GitHub Secrets

          # Firebase Configuration
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY_DEVELOPMENT }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_DEVELOPMENT }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID_DEVELOPMENT }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_DEVELOPMENT }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_DEVELOPMENT }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID_DEVELOPMENT }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID_DEVELOPMENT }}

          # Environment
          VITE_ENVIRONMENT=development
          VITE_DEBUG=${{ secrets.VITE_DEBUG_DEVELOPMENT }}

          # Coming Soon Page Control
          VITE_SHOW_COMING_SOON=${{ secrets.VITE_SHOW_COMING_SOON_DEVELOPMENT }}

          # Environment Access Control
          VITE_DEV_ACCESS_PASSWORD=${{ secrets.VITE_ACCESS_PASSWORD_DEVELOPMENT }}

          # Analytics & Monitoring
          VITE_ANALYTICS_ID=${{ secrets.VITE_ANALYTICS_ID_DEVELOPMENT }}
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN_DEVELOPMENT }}

          # Third-party Services
          VITE_ADSENSE_CLIENT=${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT=${{ secrets.VITE_ADSENSE_SLOT }}

          # Feature Flags
          VITE_ENABLE_DEBUG_TOOLS=${{ secrets.VITE_ENABLE_DEBUG_TOOLS_DEVELOPMENT }}
          VITE_ENABLE_ANALYTICS=${{ secrets.VITE_ENABLE_ANALYTICS_DEVELOPMENT }}
          VITE_ENABLE_ERROR_REPORTING=${{ secrets.VITE_ENABLE_ERROR_REPORTING_DEVELOPMENT }}
          EOF

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build ${{ matrix.package }}
        run: npm run build --workspace=packages/${{ matrix.package }}

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-build
          path: packages/${{ matrix.package }}/dist/
          retention-days: 7

  #  Deploy Web App to Firebase Hosting
  deploy-web:
    name: 🔥 Deploy Web App to Firebase (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [determine-environment, quality-check, build-packages]
    if: needs.determine-environment.outputs.should-deploy == 'true'
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Web App Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: packages/web/dist/

      - name: �� Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets[format('FIREBASE_SERVICE_ACCOUNT_{0}', needs.determine-environment.outputs.environment)] }}
          channelId: ${{ needs.determine-environment.outputs.environment == 'production' && 'live' || 'preview' }}
          projectId: ${{ needs.determine-environment.outputs.environment == 'production' && 'vehicle-vitals-prod' || needs.determine-environment.outputs.environment == 'staging' && 'vehicle-vitals-staging' || 'vehicle-vitals-dev' }}
          entryPoint: ./

  #  Deployment Summary
  deployment-summary:
    name: 📊 Deployment Summary (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-web]
    if: always() && needs.determine-environment.outputs.should-deploy == 'true'
    steps:
      - name: 📊 Generate Deployment Report
        run: |
          ENVIRONMENT="${{ needs.determine-environment.outputs.environment }}"
          echo "## 🔥 Firebase Deployment Summary - $ENVIRONMENT Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----|" >> $GITHUB_STEP_SUMMARY

          if [[ "$ENVIRONMENT" == "production" ]]; then
            WEB_URL="https://vehicle-vitals-prod.web.app"
          elif [[ "$ENVIRONMENT" == "staging" ]]; then
            WEB_URL="https://vehicle-vitals-staging.web.app"
          else
            WEB_URL="https://vehicle-vitals-dev.web.app"
          fi

          echo "| 🌐 Web App | ${{ needs.deploy-web.result }} | $WEB_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Mobile Apps | Distributed via Firebase App Distribution | N/A |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: 🔥 Firebase (Hosting + App Distribution)" >> $GITHUB_STEP_SUMMARY
