# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI — Build and Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - development

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/staging' && 'staging') || (github.ref == 'refs/heads/develop' && 'development') || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install

      - name: Build web
        run: |
          # Determine build mode and environment variables based on environment
          ENVIRONMENT="${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/staging' && 'staging') || (github.ref == 'refs/heads/develop' && 'development') || 'production' }}"
          
          echo "Building for environment: $ENVIRONMENT"

          # Set environment variables based on environment
          case "$ENVIRONMENT" in
            production)
              export VITE_FIREBASE_API_KEY="${{ secrets.PROD_VITE_FIREBASE_API_KEY }}"
              export VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.PROD_VITE_FIREBASE_AUTH_DOMAIN }}"
              export VITE_FIREBASE_PROJECT_ID="${{ secrets.PROD_VITE_FIREBASE_PROJECT_ID }}"
              export VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.PROD_VITE_FIREBASE_STORAGE_BUCKET }}"
              export VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.PROD_VITE_FIREBASE_MESSAGING_SENDER_ID }}"
              export VITE_FIREBASE_APP_ID="${{ secrets.PROD_VITE_FIREBASE_APP_ID }}"
              export VITE_FIREBASE_MEASUREMENT_ID="${{ secrets.PROD_VITE_FIREBASE_MEASUREMENT_ID }}"
              npm run build
              ;;
            staging)
              export VITE_FIREBASE_API_KEY="${{ secrets.STAGING_VITE_FIREBASE_API_KEY }}"
              export VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.STAGING_VITE_FIREBASE_AUTH_DOMAIN }}"
              export VITE_FIREBASE_PROJECT_ID="${{ secrets.STAGING_VITE_FIREBASE_PROJECT_ID }}"
              export VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.STAGING_VITE_FIREBASE_STORAGE_BUCKET }}"
              export VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.STAGING_VITE_FIREBASE_MESSAGING_SENDER_ID }}"
              export VITE_FIREBASE_APP_ID="${{ secrets.STAGING_VITE_FIREBASE_APP_ID }}"
              export VITE_FIREBASE_MEASUREMENT_ID="${{ secrets.STAGING_VITE_FIREBASE_MEASUREMENT_ID }}"
              npm run build:staging
              ;;
            development)
              export VITE_FIREBASE_API_KEY="${{ secrets.DEV_VITE_FIREBASE_API_KEY }}"
              export VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.DEV_VITE_FIREBASE_AUTH_DOMAIN }}"
              export VITE_FIREBASE_PROJECT_ID="${{ secrets.DEV_VITE_FIREBASE_PROJECT_ID }}"
              export VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.DEV_VITE_FIREBASE_STORAGE_BUCKET }}"
              export VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.DEV_VITE_FIREBASE_MESSAGING_SENDER_ID }}"
              export VITE_FIREBASE_APP_ID="${{ secrets.DEV_VITE_FIREBASE_APP_ID }}"
              export VITE_FIREBASE_MEASUREMENT_ID="${{ secrets.DEV_VITE_FIREBASE_MEASUREMENT_ID }}"
              npm run build:development
              ;;
            *)
              echo "Unknown environment '$ENVIRONMENT', defaulting to production build"
              export VITE_FIREBASE_API_KEY="${{ secrets.PROD_VITE_FIREBASE_API_KEY }}"
              export VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.PROD_VITE_FIREBASE_AUTH_DOMAIN }}"
              export VITE_FIREBASE_PROJECT_ID="${{ secrets.PROD_VITE_FIREBASE_PROJECT_ID }}"
              export VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.PROD_VITE_FIREBASE_STORAGE_BUCKET }}"
              export VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.PROD_VITE_FIREBASE_MESSAGING_SENDER_ID }}"
              export VITE_FIREBASE_APP_ID="${{ secrets.PROD_VITE_FIREBASE_APP_ID }}"
              export VITE_FIREBASE_MEASUREMENT_ID="${{ secrets.PROD_VITE_FIREBASE_MEASUREMENT_ID }}"
              npm run build
              ;;
          esac

          # Optional AdSense keys (shared across environments)
          export VITE_ADSENSE_CLIENT="${{ secrets.VITE_ADSENSE_CLIENT }}"
          export VITE_ADSENSE_SLOT="${{ secrets.VITE_ADSENSE_SLOT }}"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@11

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          # Determine Firebase project based on environment
          ENVIRONMENT="${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/staging' && 'staging') || (github.ref == 'refs/heads/develop' && 'development') || 'production' }}"
          
          case "$ENVIRONMENT" in
            production)
              FIREBASE_PROJECT="vehicle-vitals-prod"
              ;;
            staging)
              FIREBASE_PROJECT="vehicle-vitals-staging"
              ;;
            development)
              FIREBASE_PROJECT="vehicle-vitals-development"
              ;;
            *)
              FIREBASE_PROJECT="vehicle-vitals-prod"
              ;;
          esac

          # Ensure build exists
          if [ ! -d "packages/web/dist" ]; then
            echo "❌ Build directory packages/web/dist not found!"
            echo "Available files in packages/web:"
            ls -la packages/web/
            exit 1
          fi

          echo "✅ Build directory found:"
          ls -la packages/web/dist/

          # Deploy to Firebase
          echo "🚀 Deploying to Firebase project: $FIREBASE_PROJECT"
          firebase deploy --project "$FIREBASE_PROJECT" --token "$FIREBASE_TOKEN" --only hosting
