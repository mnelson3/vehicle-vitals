# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI — Build and Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - development

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/staging' && 'staging') || (github.ref == 'refs/heads/develop' && 'development') || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install

      - name: Build web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets[format('{0}_VITE_FIREBASE_API_KEY', github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'PROD') || (github.ref == 'refs/heads/staging' && 'STAGING') || (github.ref == 'refs/heads/develop' && 'DEV') || 'PROD')] }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets[format('{0}_VITE_FIREBASE_AUTH_DOMAIN', github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'PROD') || (github.ref == 'refs/heads/staging' && 'STAGING') || (github.ref == 'refs/heads/develop' && 'DEV') || 'PROD')] }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets[format('{0}_VITE_FIREBASE_PROJECT_ID', github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'PROD') || (github.ref == 'refs/heads/staging' && 'STAGING') || (github.ref == 'refs/heads/develop' && 'DEV') || 'PROD')] }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets[format('{0}_VITE_FIREBASE_STORAGE_BUCKET', github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'PROD') || (github.ref == 'refs/heads/staging' && 'STAGING') || (github.ref == 'refs/heads/develop' && 'DEV') || 'PROD')] }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets[format('{0}_VITE_FIREBASE_MESSAGING_SENDER_ID', github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'PROD') || (github.ref == 'refs/heads/staging' && 'STAGING') || (github.ref == 'refs/heads/develop' && 'DEV') || 'PROD')] }}
          VITE_FIREBASE_APP_ID: ${{ secrets[format('{0}_VITE_FIREBASE_APP_ID', github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'PROD') || (github.ref == 'refs/heads/staging' && 'STAGING') || (github.ref == 'refs/heads/develop' && 'DEV') || 'PROD')] }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets[format('{0}_VITE_FIREBASE_MEASUREMENT_ID', github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'PROD') || (github.ref == 'refs/heads/staging' && 'STAGING') || (github.ref == 'refs/heads/develop' && 'DEV') || 'PROD')] }}
          # Optional AdSense keys (shared across environments)
          VITE_ADSENSE_CLIENT: ${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT: ${{ secrets.VITE_ADSENSE_SLOT }}
        run: |
          # Determine build mode based on environment
          ENVIRONMENT="${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/staging' && 'staging') || (github.ref == 'refs/heads/develop' && 'development') || 'production' }}"

          echo "Building for environment: $ENVIRONMENT"

          case "$ENVIRONMENT" in
            production)
              npm run build
              ;;
            staging)
              npm run build:staging
              ;;
            development)
              npm run build:development
              ;;
            *)
              echo "Unknown environment '$ENVIRONMENT', defaulting to production build"
              npm run build
              ;;
          esac

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@11

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT: ${{ secrets[format('FIREBASE_PROJECT_{0}', github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'PROD') || (github.ref == 'refs/heads/staging' && 'STAGING') || (github.ref == 'refs/heads/develop' && 'DEV') || 'PROD')] }}
        run: |
          # Ensure build exists
          if [ ! -d "packages/web/dist" ]; then
            echo "❌ Build directory packages/web/dist not found!"
            echo "Available files in packages/web:"
            ls -la packages/web/
            exit 1
          fi

          echo "✅ Build directory found:"
          ls -la packages/web/dist/

          # Deploy to Firebase
          echo "🚀 Deploying to Firebase project: $FIREBASE_PROJECT"
          firebase deploy --project "$FIREBASE_PROJECT" --token "$FIREBASE_TOKEN" --only hosting
