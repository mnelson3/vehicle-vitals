name: 🔐 Test Repository Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test secrets for'
        required: true
        default: 'DEVELOPMENT'
        type: choice
        options:
          - PRODUCTION
          - STAGING
          - DEVELOPMENT

jobs:
  test-secrets:
    name: 🔐 Test Repository Secrets (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: 📋 Validate Environment Variable
        run: |
          echo "Testing secrets for environment: ${{ github.event.inputs.environment }}"
          echo "Environment variable is set correctly ✅"

      - name: 🔍 Check Firebase Secrets
        run: |
          echo "🔥 Testing Firebase Configuration Secrets..."

          # Check if Firebase secrets exist (without revealing values)
          if [[ -n "${{ secrets[format('VITE_FIREBASE_API_KEY_{0}', github.event.inputs.environment)] }}" ]]; then
            echo "✅ VITE_FIREBASE_API_KEY_${{ github.event.inputs.environment }} is set"
          else
            echo "❌ VITE_FIREBASE_API_KEY_${{ github.event.inputs.environment }} is missing"
            exit 1
          fi

          if [[ -n "${{ secrets[format('VITE_FIREBASE_PROJECT_ID_{0}', github.event.inputs.environment)] }}" ]]; then
            echo "✅ VITE_FIREBASE_PROJECT_ID_${{ github.event.inputs.environment }} is set"
          else
            echo "❌ VITE_FIREBASE_PROJECT_ID_${{ github.event.inputs.environment }} is missing"
            exit 1
          fi

          echo "✅ All Firebase secrets are accessible"

      - name: 🔥 Check Firebase Service Account
        run: |
          echo "🔥 Testing Firebase Service Account Secret..."

          # Check if the secret exists by safely printing and checking content
          if printf '%s\n' '${{ secrets[format('FIREBASE_SERVICE_ACCOUNT_{0}', github.event.inputs.environment)] }}' | head -1 | grep -q '[^[:space:]]'; then
            echo "✅ FIREBASE_SERVICE_ACCOUNT_${{ github.event.inputs.environment }} is set"
            echo "✅ Firebase service account secret is accessible"
          else
            echo "❌ FIREBASE_SERVICE_ACCOUNT_${{ github.event.inputs.environment }} is missing"
            exit 1
          fi

      - name: 🏪 Check Chrome Web Store Secrets (Production Only)
        if: github.event.inputs.environment == 'PRODUCTION'
        run: |
          echo "🏪 Testing Chrome Web Store Secrets..."

          # Check if secrets exist by safely checking content
          if printf '%s\n' '${{ secrets.CHROME_EXTENSION_ID }}' | head -1 | grep -q '[^[:space:]]'; then
            echo "✅ CHROME_EXTENSION_ID is set"
          else
            echo "❌ CHROME_EXTENSION_ID is missing"
            exit 1
          fi

          if printf '%s\n' '${{ secrets.CHROME_CLIENT_ID }}' | head -1 | grep -q '[^[:space:]]'; then
            echo "✅ CHROME_CLIENT_ID is set"
          else
            echo "❌ CHROME_CLIENT_ID is missing"
            exit 1
          fi

          if printf '%s\n' '${{ secrets.CHROME_CLIENT_SECRET }}' | head -1 | grep -q '[^[:space:]]'; then
            echo "✅ CHROME_CLIENT_SECRET is set"
          else
            echo "❌ CHROME_CLIENT_SECRET is missing"
            exit 1
          fi

          if printf '%s\n' '${{ secrets.CHROME_REFRESH_TOKEN }}' | head -1 | grep -q '[^[:space:]]'; then
            echo "✅ CHROME_REFRESH_TOKEN is set"
          else
            echo "❌ CHROME_REFRESH_TOKEN is missing"
            exit 1
          fi

          echo "✅ All Chrome Web Store secrets are accessible"

      - name: 📊 Generate Secrets Test Report
        run: |
          echo "## 🔐 Repository Secrets Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment Tested**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Test Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ All secrets are accessible and properly configured" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Secrets Validated:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Firebase Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Firebase Service Account" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event.inputs.environment }}" == "PRODUCTION" ]]; then
            echo "- ✅ Chrome Web Store" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps**: You can now run the Firebase-only CI/CD pipeline with confidence that all required secrets are properly configured." >> $GITHUB_STEP_SUMMARY