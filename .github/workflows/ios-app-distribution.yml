# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: iOS App Distribution

# iOS builds using self-hosted macOS runner
# Automatic builds are enabled for all environments

on:
  push:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'packages/mobile/**'
      - ".github/workflows/ios-app-distribution.yml"
      - ".github/actions/**"
      - "pubspec.yaml"
      - "firebase*.json"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type to distribute"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      release_notes:
        description: "Release notes for this build"
        required: false
        type: string

env:
  FLUTTER_VERSION: "3.38.1"

jobs:
  distribute-ios:
    runs-on: [self-hosted, vehicle-vitals]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
    steps:
      - name: iOS Build Environment Check
        run: |
          echo "🍎 Running on self-hosted macOS runner"
          echo "📍 Hostname: $(hostname)"
          echo "💰 Using self-hosted runner (cost savings)"
          echo "🖥️  macOS version: $(sw_vers -productVersion)"
          echo "🛠️  Xcode version: $(xcodebuild -version | head -1)"

      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⏰ Sync NTP Time
        run: |
          echo "🔄 Synchronizing system time with NTP..."
          sudo sntp -sS time.apple.com || sudo ntpdate -u time.apple.com || echo "⚠️ NTP sync failed, continuing..."

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 💎 Setup Ruby with GMP
        run: |
          echo "🔄 Installing Ruby 3.2.2 with GMP dependency..."
          brew install gmp
          \curl -sSL https://get.rvm.io | bash -s stable
          source ~/.rvm/scripts/rvm
          rvm install 3.2.2 --with-gmp-dir=$(brew --prefix gmp)
          rvm use 3.2.2 --default
          ruby --version
          echo "✅ Ruby 3.2.2 installed successfully"

      - name: 🔧 Install Fastlane
        run: |
          echo "📦 Installing Fastlane 2.229.0..."
          gem install fastlane -v 2.229.0
          fastlane --version
          echo "✅ Fastlane installed successfully"

      - name: 🔐 Setup App Store Connect Authentication
        run: |
          echo "🔄 Setting up App Store Connect authentication..."

          # Create ASC private key file
          mkdir -p ~/.private_keys
          echo "${{ secrets.ASC_PRIVATE_KEY }}" | base64 -d > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

          # Verify the key was created
          if [ -f ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 ]; then
            echo "✅ ASC private key created successfully"
          else
            echo "❌ Failed to create ASC private key"
            exit 1
          fi

      - name: 🧪 Test App Store Connect JWT
        run: |
          echo "🔄 Testing App Store Connect JWT authentication..."
          ruby -e "
          require 'jwt'
          require 'openssl'

          key_id = '${{ secrets.ASC_KEY_ID }}'
          issuer_id = '${{ secrets.ASC_ISSUER_ID }}'
          private_key_path = '~/.private_keys/AuthKey_#{key_id}.p8'

          private_key = OpenSSL::PKey::EC.new(File.read(File.expand_path(private_key_path)))

          now = Time.now.to_i
          payload = {
            iss: issuer_id,
            exp: now + 1200,
            aud: 'appstoreconnect-v1'
          }

          headers = {
            kid: key_id
          }

          token = JWT.encode(payload, private_key, 'ES256', headers)
          puts '✅ JWT token generated successfully'
          puts '🔄 Testing API connectivity...'

          # Test API call
          curl -H 'Authorization: Bearer #{token}' 'https://api.appstoreconnect.apple.com/v1/apps' -o /dev/null -s -w '%{http_code}' | grep -q '200' && echo '✅ App Store Connect API accessible' || echo '⚠️ App Store Connect API test inconclusive'
          "

      - name: 📱 Generate iOS Platform Files
        run: |
          echo "🔄 Generating iOS platform files..."
          cd mobile
          flutter create --platforms=ios .
          echo "✅ iOS platform files generated"

      - name: 🔐 Setup Service Account Key
        run: |
          echo "🔄 Setting up Firebase service account key..."
          mkdir -p mobile/ios
          echo '${{ github.ref == ''refs/heads/main'' && secrets.FIREBASE_SERVICE_ACCOUNT_KEY_PRODUCTION || github.ref == ''refs/heads/staging'' && secrets.FIREBASE_SERVICE_ACCOUNT_KEY_STAGING || secrets.FIREBASE_SERVICE_ACCOUNT_KEY_DEVELOPMENT }}' > mobile/ios/service-account-key.json
          echo "✅ Service account key configured"

      - name: 🔐 Decode iOS Distribution Certificate
        run: |
          echo "🔄 Decoding iOS distribution certificate..."
          mkdir -p mobile/ios/certs
          echo "${{ secrets.IOS_CERT_P12_BASE64 }}" | base64 -d > mobile/ios/certs/dist_cert.p12
          if [ -f mobile/ios/certs/dist_cert.p12 ]; then
            echo "✅ iOS distribution certificate decoded"
          else
            echo "❌ Failed to decode iOS distribution certificate"
            exit 1
          fi

      - name: 🔑 Setup Ephemeral Keychain
        run: |
          echo "🔄 Setting up ephemeral keychain..."
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          # Create ephemeral keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" fastlane_tmp_keychain
          security set-keychain-settings -lut 21600 fastlane_tmp_keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" fastlane_tmp_keychain

          # Make it the default keychain
          security default-keychain -s fastlane_tmp_keychain

          # Import certificate
          if [ -f mobile/ios/certs/dist_cert.p12 ]; then
            security import mobile/ios/certs/dist_cert.p12 -k fastlane_tmp_keychain -P "${{ secrets.IOS_CERT_PASSWORD }}" -T /usr/bin/codesign
            echo "✅ Certificate imported to keychain"
          else
            echo "⚠️ No certificate file found, skipping import"
          fi

          echo "✅ Ephemeral keychain setup complete"

      - name: 🏗️ Build and Distribute iOS App
        run: |
          echo "🚀 Building and distributing iOS app..."

          # Set release notes
          RELEASE_NOTES="${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"
          echo "RELEASE_NOTES=$RELEASE_NOTES" >> $GITHUB_ENV

          cd mobile/ios

          # Configure Fastlane environment
          export FASTLANE_APPLE_ID="${{ secrets.FASTLANE_APPLE_ID }}"
          export FASTLANE_TEAM_ID="${{ secrets.FASTLANE_TEAM_ID }}"
          export FASTLANE_ITC_TEAM_ID="${{ secrets.FASTLANE_ITC_TEAM_ID }}"
          export ASC_KEY_ID="${{ secrets.ASC_KEY_ID }}"
          export ASC_ISSUER_ID="${{ secrets.ASC_ISSUER_ID }}"
          export ASC_PRIVATE_KEY="${{ secrets.ASC_PRIVATE_KEY }}"
          export MATCH_GIT_URL="${{ secrets.MATCH_GIT_URL }}"
          export MATCH_PASSWORD="${{ secrets.MATCH_PASSWORD }}"
          export BETA_FEEDBACK_EMAIL="${{ secrets.BETA_FEEDBACK_EMAIL }}"
          export KEYCHAIN_PASSWORD="$KEYCHAIN_PASSWORD"

          # Execute Fastlane based on release type
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"

          if [[ "$GITHUB_REF" == "refs/heads/main" ]] || [[ "$GITHUB_REF" == "refs/heads/staging" ]] || [[ "$RELEASE_TYPE" == "release" ]]; then
            # Production/Staging OR manual release: Upload to TestFlight
            echo "🚀 Building and uploading to TestFlight..."
            fastlane beta
          else
            # Development: Just build and test
            echo "🔨 Building for development testing..."
            fastlane build_development
          fi

      - name: 🧹 Clean Up
        if: always()
        run: |
          echo "🧹 Cleaning up temporary files and keychains..."

          # Delete ephemeral keychain
          security delete-keychain fastlane_tmp_keychain 2>/dev/null || true

          # Clean up private keys
          rm -rf ~/.private_keys

          # Clean up service account files
          rm -f mobile/ios/service-account-key.json

          # Clean up certificates
          rm -rf mobile/ios/certs

          echo "✅ Cleanup complete"
