name: Emulator Tests

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-with-emulator:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java (required for Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install firebase-tools
        run: |
          cd packages/web
          npm install firebase-tools@13 --save-dev
          npx firebase --version

      - name: Authenticate Firebase CLI
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > service-account-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=service-account-key.json" >> $GITHUB_ENV
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY_DEVELOPMENT }}

      - name: Run tests with Firestore emulator
        env:
          CI: true
        run: |
          # Install web dependencies and run tests inside the emulator so emulator-dependent tests run
          cd packages/web
          npm ci --legacy-peer-deps

          # Build shared package first
          cd ../shared
          npm run build
          cd ../web

          # Debug: Check firebase version and available commands
          echo "Firebase version:"
          npx firebase --version
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version

          # Run tests inside the emulator context so the rules-unit-testing code can auto-discover it
          # Using firebase emulators:exec ensures emulator host/port are provided to tests.
          echo "Starting emulators and running tests..."
          npx firebase emulators:exec --only firestore --project vehicle-vitals-dev "npm run test"

      - name: Clean up service account key
        if: always()
        run: rm -f service-account-key.json
