name: Emulator Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-with-emulator:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install firebase-tools
        run: |
          # Clean up any existing firebase-tools installation
          rm -rf /Users/marknelson/Circus/Repositories/vehicle-vitals-actions-runner/_work/_tool/node/*/arm64/lib/node_modules/firebase-tools || true
          rm -rf /Users/marknelson/Circus/Repositories/vehicle-vitals-actions-runner/_work/_tool/node/*/x64/lib/node_modules/firebase-tools || true
          npm cache clean --force || true
          npm install -g firebase-tools@13

      - name: Authenticate Firebase CLI
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > service-account-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=service-account-key.json" >> $GITHUB_ENV
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Set Firebase project
        run: firebase use default

      - name: Run tests with Firestore emulator
        env:
          CI: true
        run: |
          # Install web dependencies and run tests inside the emulator so emulator-dependent tests run
          cd packages/web
          npm ci --legacy-peer-deps

          # Debug: Check firebase version and available commands
          echo "Firebase version:"
          firebase --version
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version

          # Run tests inside the emulator context so the rules-unit-testing code can auto-discover it
          # Using firebase emulators:exec ensures emulator host/port are provided to tests.
          echo "Starting emulators and running tests..."
          firebase emulators:exec --only firestore --project vehicle-vitals-dev "npm run test"

      - name: Clean up service account key
        if: always()
        run: rm -f service-account-key.json
