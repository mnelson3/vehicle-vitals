name: Emulator Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-with-emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install firebase-tools
        run: npm install -g firebase-tools@11

      - name: Run tests with Firestore emulator
        env:
          CI: true
        run: |
          # Install web dependencies and run tests inside the emulator so emulator-dependent tests run
          cd web
          npm ci --legacy-peer-deps
          # Run tests inside the emulator context so the rules-unit-testing code can auto-discover it
          # Using firebase emulators:exec ensures emulator host/port are provided to tests.
          firebase emulators:exec "npm test"
