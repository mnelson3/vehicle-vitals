# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🍎 iOS App Distribution

# Simplified iOS workflow for builds and releases
# Handles local builds, TestFlight distribution, and App Store releases

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of build/release"
        required: true
        type: choice
        options:
          - build_only
          - testflight
          - app_store
          - full_pipeline
      release_notes:
        description: "Release notes for this build/release"
        required: false
        type: string
      beta_group_name:
        description: "Name of TestFlight beta group (for full pipeline)"
        required: false
        default: "Internal Testers"
        type: string
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - staging
      - main
    paths:
      - "packages/mobile/**"
      - ".github/workflows/ios-app-distribution.yml"
      - ".github/actions/**"
      - "pubspec.yaml"
      - "firebase*.json"

jobs:
  distribute-ios:
    runs-on: [self-hosted, macOS, ios]
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_type == 'app_store' || inputs.release_type == 'full_pipeline') && 'PRODUCTION' || 'DEVELOPMENT' }}
    defaults:
      run:
        working-directory: packages/mobile
    steps:
      - name: iOS Build Environment Check
        working-directory: .
        run: |
          echo '🍎 Running on self-hosted macOS runner'
          echo '📍 Hostname: $(hostname)'
          echo '💰 Using self-hosted runner (cost savings)'
          echo '🖥️  macOS version: $(sw_vers -productVersion)'
          echo '🛠️  Xcode version: $(xcodebuild -version | head -1)'

      - name: 🔧 Fix Git Config for HTTPS Checkout
        working-directory: .
        run: |
          echo '🔄 Removing any global SSH redirects for GitHub to ensure HTTPS checkout works...'
          git config --global --unset-all url."git@github.com:".insteadOf || true
          echo '✅ Git config fixed for HTTPS checkout'

      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⏰ Sync NTP Time
        run: |
          echo '🔄 Synchronizing system time with NTP...'
          sudo sntp -sS time.apple.com || sudo ntpdate -u time.apple.com || echo '⚠️ NTP sync failed, continuing...'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          channel: stable
          cache: false
          architecture: arm64

      - name: 📦 Get Flutter Dependencies
        run: flutter pub get

      - name: 🔧 Install GMP (Ruby dependency)
        run: |
          echo '📦 Installing GMP library...'
          brew install gmp
          echo '✅ GMP installed successfully'

      - name: 🧹 Clear Ruby and Bundler Cache
        run: |
          echo '🧹 Clearing Ruby and Bundler cache...'
          rm -rf ~/.bundle/cache
          gem cleanup || true
          echo '✅ Cache cleared'

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler: "2.4.22"
          bundler-cache: true

      - name: 🔧 Install Fastlane
        run: |
          echo '📦 Installing Fastlane 2.230.0...'
          gem install fastlane -v 2.230.0
          echo '📦 Installing CocoaPods...'
          gem install cocoapods
          fastlane --version
          echo '✅ Fastlane and CocoaPods installed successfully'

      - name: 🔏 Install Apple WWDR Certificate
        run: |
          set -euo pipefail
          echo '🔏 Ensuring Apple WWDR intermediate certificate is available...'

          TMP_WWDR="/tmp/AppleWWDRCA.cer"
          rm -f "$TMP_WWDR" || true

          # Apple has historically moved/renamed this certificate; try a couple of common URLs.
          for url in \
            "https://developer.apple.com/certificationauthority/AppleWWDRCAG3.cer" \
            "https://developer.apple.com/certificationauthority/AppleWWDRCA.cer"; do
            if curl -fsSL "$url" -o "$TMP_WWDR"; then
              echo "✅ Downloaded WWDR certificate from: $url"
              break
            fi
          done

          if [ ! -s "$TMP_WWDR" ]; then
            echo '❌ Failed to download Apple WWDR certificate'
            exit 1
          fi

          # Import into login keychain (no-op if already present).
          security import "$TMP_WWDR" -k "$HOME/Library/Keychains/login.keychain-db" -T /usr/bin/codesign -T /usr/bin/security || true

          # Best-effort verification (do not fail if search semantics differ on this macOS).
          security find-certificate -c "Apple Worldwide Developer Relations" "$HOME/Library/Keychains/login.keychain-db" >/dev/null 2>&1 \
            && echo '✅ WWDR certificate present in login keychain' \
            || echo '⚠️ WWDR certificate verification inconclusive'

      - name: 🔐 Setup App Store Connect Authentication
        run: |
          echo '🔄 Setting up App Store Connect authentication...'

          # Create ASC private key file
          mkdir -p ~/.private_keys
          KEY_PATH="$HOME/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

          # Save secret to a temp file to inspect it
          echo '${{ secrets.ASC_PRIVATE_KEY }}' > "$KEY_PATH.tmp"

          # Check if it looks like a PEM key (starts with dashes)
          if grep -q "^-----BEGIN" "$KEY_PATH.tmp"; then
            echo "ℹ️ Key appears to be plain text PEM."
            mv "$KEY_PATH.tmp" "$KEY_PATH"
          else
            echo "ℹ️ Key appears to be base64 encoded. Decoding..."
            # Use openssl for better cross-platform support (macOS/Linux)
            openssl base64 -d -A -in "$KEY_PATH.tmp" -out "$KEY_PATH"
            rm "$KEY_PATH.tmp"
          fi

          # Verify the key was created
          if [ -f "$KEY_PATH" ]; then
            echo '✅ ASC private key created successfully'
          else
            echo '❌ Failed to create ASC private key'
            exit 1
          fi

      - name: 🧪 Test App Store Connect JWT
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          echo '🔄 Testing App Store Connect JWT authentication...'
          cat << 'EOF' | ruby
          require 'jwt'
          require 'openssl'

          key_id = ENV['ASC_KEY_ID']
          issuer_id = ENV['ASC_ISSUER_ID']
          private_key_path = "#{ENV['HOME']}/.private_keys/AuthKey_#{key_id}.p8"

          private_key = OpenSSL::PKey::EC.new(File.read(private_key_path))

          now = Time.now.to_i
          payload = {
            iss: issuer_id,
            exp: now + 1200,
            aud: 'appstoreconnect-v1'
          }

          headers = {
            kid: key_id
          }

          token = JWT.encode(payload, private_key, 'ES256', headers)
          puts '✅ JWT token generated successfully'
          puts '🔄 Testing API connectivity...'

          # Test API call
          system("curl -H 'Authorization: Bearer #{token}' 'https://api.appstoreconnect.apple.com/v1/apps' -o /dev/null -s -w '%{http_code}' | grep -q '200' && echo '✅ App Store Connect API accessible' || echo '⚠️ App Store Connect API test inconclusive'")
          EOF

      - name: 📦 Install iOS Ruby Dependencies
        run: |
          echo '📦 Installing Ruby dependencies from Gemfile...'
          cd ios
          bundle install
          echo '📋 Installed gem versions:'
          bundle list | grep -E '(fastlane|cocoapods)'
          echo '✅ Bundle dependencies installed'

      - name: 🔐 Setup Service Account Key
        run: |
          echo '🔄 Setting up Firebase service account key...'
          mkdir -p ios
          echo '${{ github.ref == 'refs/heads/main' && secrets.FIREBASE_SERVICE_ACCOUNT_KEY_PRODUCTION || github.ref == 'refs/heads/staging' && secrets.FIREBASE_SERVICE_ACCOUNT_KEY_STAGING || secrets.FIREBASE_SERVICE_ACCOUNT_KEY_DEVELOPMENT }}' > ios/service-account-key.json
          echo '✅ Service account key configured'

      - name: 🏗️ Build and Distribute iOS App
        run: |
          echo '🚀 Building and distributing iOS app...'

          # Set release notes
          RELEASE_NOTES="${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"
          echo "RELEASE_NOTES=$RELEASE_NOTES" >> $GITHUB_ENV

          cd ios

          # Ensure ephemeral keychain helper is executable
          chmod +x ../../../scripts/ephemeral_keychain_fastlane_fixed.sh

          # Configure Fastlane environment
          export FASTLANE_APPLE_ID='${{ secrets.FASTLANE_APPLE_ID }}'
          export FASTLANE_TEAM_ID='${{ secrets.FASTLANE_TEAM_ID }}'
          export FASTLANE_ITC_TEAM_ID='${{ secrets.FASTLANE_ITC_TEAM_ID }}'
          export ASC_KEY_ID='${{ secrets.ASC_KEY_ID }}'
          export ASC_ISSUER_ID='${{ secrets.ASC_ISSUER_ID }}'
          export ASC_PRIVATE_KEY='${{ secrets.ASC_PRIVATE_KEY }}'
          export MATCH_GIT_URL='${{ secrets.MATCH_GIT_URL }}'
          export NELSON_GREY_PAT='${{ secrets.NELSON_GREY_PAT }}'
          export MATCH_SSH_PRIVATE_KEY='${{ secrets.MATCH_SSH_PRIVATE_KEY }}'
          # Secrets can include a trailing newline if pasted accidentally; strip CR/LF.
          MATCH_GIT_URL="$(printf %s "$MATCH_GIT_URL" | tr -d '\r\n')"
          NELSON_GREY_PAT="$(printf %s "$NELSON_GREY_PAT" | tr -d '\r\n')"
          # SSH private keys must keep newlines; only strip CR (Windows line endings).
          MATCH_SSH_PRIVATE_KEY="$(printf %s "$MATCH_SSH_PRIVATE_KEY" | tr -d '\r')"

          # Prefer SSH for match repo access if a valid key is available.
          USE_MATCH_SSH=0
          if [[ -n "$MATCH_SSH_PRIVATE_KEY" ]]; then
            echo '🔐 SSH key provided for match repo access; validating...'
            mkdir -p "$HOME/.ssh"
            chmod 700 "$HOME/.ssh"
            MATCH_SSH_KEY_FILE="$HOME/.ssh/match_repo_key"

            # Some setups store the private key base64-encoded to avoid multiline secrets.
            if [[ "$MATCH_SSH_PRIVATE_KEY" == "-----BEGIN "* ]]; then
              printf '%s' "$MATCH_SSH_PRIVATE_KEY" > "$MATCH_SSH_KEY_FILE"
            else
              if printf '%s' "$MATCH_SSH_PRIVATE_KEY" | base64 -d > "$MATCH_SSH_KEY_FILE" 2>/dev/null; then
                :
              else
                printf '%s' "$MATCH_SSH_PRIVATE_KEY" > "$MATCH_SSH_KEY_FILE"
              fi
            fi

            chmod 600 "$MATCH_SSH_KEY_FILE"
            echo "🔎 match SSH key first line: $(head -n 1 "$MATCH_SSH_KEY_FILE" 2>/dev/null || true)"
            echo "🔎 match SSH key bytes: $(wc -c < "$MATCH_SSH_KEY_FILE" 2>/dev/null | tr -d ' ')"
            
            # Ensure newline at the end of the key file
            if [ -n "$(tail -c 1 "$MATCH_SSH_KEY_FILE")" ]; then
                echo >> "$MATCH_SSH_KEY_FILE"
            fi

            if ssh-keygen -y -f "$MATCH_SSH_KEY_FILE" >/dev/null 2>&1; then
              USE_MATCH_SSH=1
              echo "✅ SSH key is valid. Fingerprint:"
              ssh-keygen -l -f "$MATCH_SSH_KEY_FILE" || echo "  (fingerprint display failed, but key is valid)"
            else
              echo '⚠️ MATCH_SSH_PRIVATE_KEY is not a valid SSH private key; falling back to PAT/HTTPS match repo access'
              rm -f "$MATCH_SSH_KEY_FILE" || true
            fi
          fi

          if [[ "$USE_MATCH_SSH" == "1" ]]; then
            echo '🔐 Using SSH key for match repo access'
            ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
            export GIT_SSH_COMMAND="ssh -i $MATCH_SSH_KEY_FILE -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
            
            # Debug SSH connection
            echo "🔍 Testing SSH connection to GitHub..."
            ssh -T -v -i "$MATCH_SSH_KEY_FILE" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts" git@github.com || true

            BASE_MATCH_URL="git@github.com:mnelson3/nelson-grey.git"
            MATCH_GIT_URL="$BASE_MATCH_URL"
            export MATCH_GIT_URL
          else
          # Build a usable match repo URL. Prefer an explicitly-configured MATCH_GIT_URL.
          BASE_MATCH_URL="$MATCH_GIT_URL"
          if [[ -z "$BASE_MATCH_URL" ]]; then
            BASE_MATCH_URL="https://github.com/mnelson3/nelson-grey.git"
          fi

          if [[ "$BASE_MATCH_URL" == *"@"* ]]; then
            MATCH_GIT_URL="$BASE_MATCH_URL"
          else
            if [[ -z "$NELSON_GREY_PAT" ]]; then
              echo '❌ MATCH_GIT_URL does not include credentials and NELSON_GREY_PAT is not set.'
              exit 1
            fi
            if [[ "$BASE_MATCH_URL" == https://* ]]; then
              MATCH_GIT_URL="https://mnelson3:${NELSON_GREY_PAT}@${BASE_MATCH_URL#https://}"
            else
              MATCH_GIT_URL="https://mnelson3:${NELSON_GREY_PAT}@github.com/${BASE_MATCH_URL#github.com/}"
            fi
          fi
          export MATCH_GIT_URL
          fi
          export MATCH_PASSWORD='${{ secrets.MATCH_PASSWORD }}'
          export BETA_FEEDBACK_EMAIL='${{ secrets.BETA_FEEDBACK_EMAIL }}'

          # Secrets can include a trailing newline if pasted accidentally; strip CR/LF.
          MATCH_PASSWORD="$(printf %s "$MATCH_PASSWORD" | tr -d '\r\n')"
          export MATCH_PASSWORD

          # Zero-touch self-heal: allow Fastlane to nuke+regenerate signing assets
          # when `match` cannot produce a usable local codesigning identity.
          export VV_MATCH_NUKE_ON_IDENTITY_FAILURE='1'

          # Preflight: verify the token can read the match repo
          echo '🔐 Verifying access to match certificates repo...'
          if ! ERR_OUT=$(GIT_TERMINAL_PROMPT=0 git ls-remote "$MATCH_GIT_URL" HEAD 2>&1 >/dev/null); then
            echo '❌ Cannot access match repo using MATCH_GIT_URL. Check MATCH_GIT_URL / NELSON_GREY_PAT permissions/validity.'
            echo "Git said: ${ERR_OUT}"
            exit 1
          fi
          echo '✅ Match repo accessible'

          # Determine mode and execute appropriate Fastlane command
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            # PR: Just build and test
            echo '🔨 Building for PR testing...'
            ../../../scripts/ephemeral_keychain_fastlane_fixed.sh "bundle exec fastlane build_development"
          else
            # Manual dispatch: execute based on release_type input
            RELEASE_TYPE="${{ github.event.inputs.release_type }}"
            BETA_GROUP_NAME="${{ github.event.inputs.beta_group_name || 'Internal Testers' }}"

            # If triggered by push (e.g. to develop), default to testflight
            if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
                RELEASE_TYPE="testflight"
            fi

            case "$RELEASE_TYPE" in
              "build_only")
                echo '🔨 Building for local testing...'
                ../../../scripts/ephemeral_keychain_fastlane_fixed.sh "bundle exec fastlane build_development"
                ;;
              "testflight")
                echo '🎯 Running TestFlight release...'
                ../../../scripts/ephemeral_keychain_fastlane_fixed.sh "bundle exec fastlane beta"
                ;;
              "app_store")
                echo '🏪 Running App Store submission...'
                ../../../scripts/ephemeral_keychain_fastlane_fixed.sh "bundle exec fastlane submit_to_app_store release_notes:\"$RELEASE_NOTES\""
                ;;
              "full_pipeline")
                echo '🚀 Running complete release pipeline...'
                ../../../scripts/ephemeral_keychain_fastlane_fixed.sh "bundle exec fastlane full_release_pipeline release_notes:\"$RELEASE_NOTES\" manage_beta:true beta_group_name:\"$BETA_GROUP_NAME\" submit_to_app_store:true"
                ;;
              *)
                echo "❌ Unknown release type: $RELEASE_TYPE"
                exit 1
                ;;
            esac
          fi

      - name: 🧹 Clean Up
        if: always()
        run: |
          echo '🧹 Cleaning up temporary files and keychains...'

          # Clean up private keys
          rm -rf ~/.private_keys

          # Clean up service account files
          rm -f ios/service-account-key.json
          echo '✅ Cleanup complete'
