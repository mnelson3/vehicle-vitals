name: 📊 Workflow Monitoring & Alerting

on:
  workflow_run:
    workflows:
      [
        "🚀 CI/CD Pipeline - Build, Test & Deploy All Deliverables",
        "Android App Distribution",
        "iOS App Distribution",
        "🔒 Security Scan",
      ]
    types: [completed]

jobs:
  # 📊 Monitor Workflow Status
  monitor-workflows:
    name: 📊 Monitor Workflow Status
    runs-on: self-hosted
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📊 Analyze Workflow Failure
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"

          echo "## 🚨 Workflow Failure Alert" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow**: $WORKFLOW_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: $CONCLUSION" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID**: [$RUN_ID](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: [$HEAD_SHA](https://github.com/${{ github.repository }}/commit/$HEAD_SHA)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: $HEAD_BRANCH" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.event.workflow_run.triggering_actor.login }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get failure details if available
          if [ -n "$RUN_ID" ]; then
            echo "### 🔍 Failure Details" >> $GITHUB_STEP_SUMMARY
            echo "Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID) for detailed logs." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Recovery Actions" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the failure logs in the workflow run" >> $GITHUB_STEP_SUMMARY
          echo "2. Check for recent changes that might have caused the issue" >> $GITHUB_STEP_SUMMARY
          echo "3. Re-run the workflow if it's a transient failure" >> $GITHUB_STEP_SUMMARY
          echo "4. Contact the development team if needed" >> $GITHUB_STEP_SUMMARY

      - name: 📢 Send Slack Notification (if configured)
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          # This would send a Slack notification if SLACK_WEBHOOK_URL is set
          # For now, just log that we would send a notification
          echo "📢 Would send Slack notification for workflow failure"
          echo "Configure SLACK_WEBHOOK_URL secret to enable notifications"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 📧 Send Email Notification (if configured)
        if: env.SMTP_SERVER != ''
        run: |
          # This would send an email notification if SMTP is configured
          # For now, just log that we would send a notification
          echo "📧 Would send email notification for workflow failure"
          echo "Configure SMTP secrets to enable notifications"
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

  # 📈 Collect Workflow Metrics
  collect-metrics:
    name: 📈 Collect Workflow Metrics
    runs-on: self-hosted
    if: always()
    steps:
      - name: 📊 Collect Metrics
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          DURATION=$(( ${{ github.event.workflow_run.updated_at }} - ${{ github.event.workflow_run.created_at }} ))

          echo "## 📊 Workflow Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | $WORKFLOW_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $CONCLUSION |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | $DURATION seconds |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | $RUN_ID |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Store metrics for trend analysis (would integrate with monitoring system)
          echo "Metrics collected for $WORKFLOW_NAME"
