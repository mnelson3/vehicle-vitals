# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: iOS App Distribution

on:
  push:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to distribute'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
      release_notes:
        description: 'Release notes for this build'
        required: false
        type: string

jobs:
  distribute-ios:
    runs-on: macos-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install Fastlane
        run: gem install fastlane

      - name: Generate iOS platform files
        run: |
          cd packages/mobile
          flutter create --platforms=ios .

      - name: Create App Store Connect API key
        if: github.event.inputs.build_type == 'testflight' || github.ref == 'refs/heads/main'
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p packages/mobile/ios/fastlane
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > packages/mobile/ios/fastlane/AuthKey.p8

      - name: Create service account key file
        if: github.event.inputs.build_type != 'testflight'
        env:
          IOS_SERVICE_ACCOUNT_KEY: ${{ secrets.IOS_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p packages/mobile/ios
          echo "$IOS_SERVICE_ACCOUNT_KEY" > packages/mobile/ios/service-account-key.json

      - name: Set Fastlane environment variables
        run: |
          echo "FASTLANE_APPLE_ID=${{ secrets.FASTLANE_APPLE_ID }}" >> $GITHUB_ENV
          echo "FASTLANE_ITC_TEAM_ID=${{ secrets.FASTLANE_ITC_TEAM_ID }}" >> $GITHUB_ENV
          echo "FASTLANE_TEAM_ID=${{ secrets.FASTLANE_TEAM_ID }}" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_PRIVATE_KEY_ID=${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_ID }}" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_ISSUER_ID=${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" >> $GITHUB_ENV
          echo "IOS_APP_ID=${{ secrets.IOS_APP_ID }}" >> $GITHUB_ENV
          echo "IOS_SERVICE_ACCOUNT_KEY_FILE=service-account-key.json" >> $GITHUB_ENV

      - name: Create GoogleService-Info.plist for development
        if: github.ref == 'refs/heads/develop'
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DEVELOPMENT }}
        run: |
          mkdir -p packages/mobile/config/development/ios
          echo "$GOOGLE_SERVICE_INFO_PLIST" > packages/mobile/config/development/ios/GoogleService-Info.plist

      - name: Create GoogleService-Info.plist for staging
        if: github.ref == 'refs/heads/staging'
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_STAGING }}
        run: |
          mkdir -p packages/mobile/config/staging/ios
          echo "$GOOGLE_SERVICE_INFO_PLIST" > packages/mobile/config/staging/ios/GoogleService-Info.plist

      - name: Create GoogleService-Info.plist for production
        if: github.ref == 'refs/heads/main'
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_PRODUCTION }}
        run: |
          mkdir -p packages/mobile/config/production/ios
          echo "$GOOGLE_SERVICE_INFO_PLIST" > packages/mobile/config/production/ios/GoogleService-Info.plist

      - name: Make distribution script executable
        run: chmod +x packages/mobile/distribute-ios.sh

      - name: Extract AdMob configuration for production
        if: github.ref == 'refs/heads/main'
        run: |
          # Use GitHub secrets for AdMob configuration
          echo "ADMOB_BANNER_UNIT_ID=${{ secrets.ADMOB_BANNER_UNIT_ID_IOS }}" >> $GITHUB_ENV
          echo "ADMOB_INTERSTITIAL_UNIT_ID=${{ secrets.ADMOB_INTERSTITIAL_UNIT_ID_IOS }}" >> $GITHUB_ENV
          echo "ADMOB_REWARDED_UNIT_ID=${{ secrets.ADMOB_REWARDED_UNIT_ID_IOS }}" >> $GITHUB_ENV

      - name: Build and distribute iOS app
        env:
          ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'development' }}
        run: |
          cd packages/mobile
          ./distribute-ios.sh ${{ github.event.inputs.build_type || 'debug' }} "${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"

      - name: Clean up service account key
        if: always()
        run: rm -f packages/mobile/ios/service-account-key.json packages/mobile/ios/fastlane/AuthKey.p8