name: iOS Distribution
on:
  push:
    branches: [ main, develop ]
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/ios-distribution.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'packages/mobile/**'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - production

jobs:
  distribute-ios:
    runs-on: [self-hosted, macos, vehicle-vitals]
    environment: ${{ github.event.inputs.release_type || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify repository structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Repository contents:"
          ls -la
          echo "Checking for mobile package:"
          if [ -d "packages/mobile" ]; then
            echo "✅ packages/mobile exists"
            if [ -d "packages/mobile/ios" ]; then
              echo "✅ packages/mobile/ios exists"
            else
              echo "❌ packages/mobile/ios missing"
              exit 1
            fi
          else
            echo "❌ packages/mobile missing"
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          cache: true

      - name: Install Fastlane
        run: |
          # Install Fastlane to user directory for self-hosted runner permissions
          gem install --user-install fastlane -v 2.228.0
          gem install --user-install bundler

          # Add user gem bin to PATH
          echo "$HOME/.gem/ruby/$(ruby -e 'puts RUBY_VERSION')/bin" >> $GITHUB_PATH

      - name: Verify Fastlane Installation
        run: |
          fastlane --version
          bundle --version

      - name: Setup iOS Environment
        run: |
          # Ensure Xcode command line tools are available
          xcode-select -p || xcode-select --install

          # Accept Xcode license if needed
          sudo xcodebuild -license accept || true

          # List available Xcode versions
          ls /Applications | grep Xcode || echo "Xcode not found in /Applications"

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: packages/mobile

      - name: Verify checkout and directory structure
        run: |
          pwd
          ls -la
          ls -la packages/ || echo "packages/ not found"
          ls -la packages/mobile/ || echo "packages/mobile/ not found"
          ls -la packages/mobile/ios/ || echo "packages/mobile/ios/ not found"

      - name: Install iOS dependencies
        working-directory: packages/mobile/ios
        run: |
          pwd
          ls -la
          bundle install || true  # Continue if no Gemfile

      - name: Setup macOS CI Environment
        run: |
          chmod +x scripts/setup-macos-ci.sh
          ./scripts/setup-macos-ci.sh
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Clean environment variables
        run: |
          # Trim whitespace and newlines from sensitive environment variables
          CLEAN_MATCH_GIT_URL=$(echo "${MATCH_GIT_URL}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          echo "MATCH_GIT_URL=${CLEAN_MATCH_GIT_URL}" >> $GITHUB_ENV
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}

      - name: Set up code signing
        working-directory: packages/mobile/ios
        run: fastlane certificates_appstore
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ env.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Set up code signing
        working-directory: packages/mobile/ios
        run: fastlane certificates_appstore
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ env.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Set up code signing
        working-directory: packages/mobile/ios
        run: fastlane certificates_appstore
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ env.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Build Flutter iOS
        run: |
          flutter build ipa --release --no-codesign
        working-directory: packages/mobile

      - name: Sign and package for TestFlight
        working-directory: packages/mobile/ios
        run: fastlane build_testflight
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ env.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload to TestFlight
        if: github.event.inputs.release_type != 'production' || github.ref == 'refs/heads/main'
        working-directory: packages/mobile/ios
        run: fastlane beta
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ env.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BETA_FEEDBACK_EMAIL: ${{ secrets.BETA_FEEDBACK_EMAIL }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: |
            packages/mobile/build/ios/ipa/
            packages/mobile/ios/fastlane/report.xml
          retention-days: 30