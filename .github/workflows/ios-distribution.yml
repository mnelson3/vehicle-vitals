name: iOS Distribution
on:
  push:
    branches: [ main, develop ]
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/ios-distribution.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'packages/mobile/**'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - production

jobs:
  distribute-ios:
    runs-on: [self-hosted, macos, vehicle-vitals]
    environment: ${{ github.event.inputs.release_type || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          cache: true

      - name: Install Fastlane
        run: |
          # Install Fastlane to user directory for self-hosted runner permissions
          gem install --user-install fastlane -v 2.228.0
          gem install --user-install bundler

          # Add user gem bin to PATH
          echo "$HOME/.gem/ruby/$(ruby -e 'puts RUBY_VERSION')/bin" >> $GITHUB_PATH

      - name: Verify Fastlane Installation
        run: |
          fastlane --version
          bundle --version

      - name: Setup iOS Environment
        run: |
          # Ensure Xcode command line tools are available
          xcode-select -p || xcode-select --install

          # Accept Xcode license if needed
          sudo xcodebuild -license accept || true

          # List available Xcode versions
          ls /Applications | grep Xcode || echo "Xcode not found in /Applications"

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: packages/mobile

      - name: Install iOS dependencies
        run: |
          cd packages/mobile/ios
          bundle install || true  # Continue if no Gemfile

      - name: Setup macOS CI Environment
        run: |
          chmod +x scripts/setup-macos-ci.sh
          ./scripts/setup-macos-ci.sh
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Set up code signing
        run: |
          cd packages/mobile/ios
          fastlane sync_signing
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Build Flutter iOS
        run: |
          flutter build ipa --release --no-codesign
        working-directory: packages/mobile

      - name: Sign and package for TestFlight
        run: |
          cd packages/mobile/ios
          fastlane build_testflight
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload to TestFlight
        if: github.event.inputs.release_type != 'production' || github.ref == 'refs/heads/main'
        run: |
          cd packages/mobile/ios
          fastlane beta
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BETA_FEEDBACK_EMAIL: ${{ secrets.BETA_FEEDBACK_EMAIL }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: |
            packages/mobile/build/ios/ipa/
            packages/mobile/ios/fastlane/report.xml
          retention-days: 30