# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🔐 API Key Health Check

on:
  workflow_dispatch:
    inputs:
      force_check:
        description: 'Force immediate API key check'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.35.7'

jobs:
  api-key-health-check:
    name: 🔍 API Key Health Check
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Check API Key Health
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          chmod +x scripts/check-api-key.sh
          ./scripts/check-api-key.sh

      - name: 📢 Alert on API Key Expiration
        if: failure()
        run: |
          echo "🚨 ZERO-TOUCH ALERT: App Store Connect API Key Expired"
          echo "===================================================="
          echo ""
          echo "The App Store Connect API key has expired and requires immediate rotation."
          echo ""
          echo "📋 IMMEDIATE ACTION REQUIRED:"
          echo ""
          echo "1. 🌐 Go to: https://appstoreconnect.apple.com/access/api"
          echo "2. 🔑 Create new API key with 'Developer' and 'App Manager' access"
          echo "3. 💾 Download .p8 file and convert to base64"
          echo "4. 🔒 Update GitHub secrets: ASC_KEY_ID, ASC_ISSUER_ID, ASC_PRIVATE_KEY"
          echo "5. 🗑️ Delete old key from App Store Connect"
          echo ""
          echo "📞 iOS CI/CD builds will fail until the key is rotated"
          echo ""
          echo "🔄 After rotation, ZERO-TOUCH certificate management will resume automatically"
          exit 1

      - name: ✅ Success Notification
        if: success()
        run: |
          echo "🎉 API key health check passed - ZERO-TOUCH system operational"