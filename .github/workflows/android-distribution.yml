# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Android App Distribution

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to distribute'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
      release_notes:
        description: 'Release notes for this build'
        required: false
        type: string

jobs:
  distribute-android:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android platform files
        run: |
          cd packages/mobile
          flutter create --platforms=android .

      - name: Create service account key file
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p packages/mobile/android/app
          echo "$SERVICE_ACCOUNT_KEY" > packages/mobile/android/app/service-account-key.json

      - name: Make distribution script executable
        run: chmod +x packages/mobile/distribute-android.sh

      - name: Extract AdMob configuration for production
        if: github.ref == 'refs/heads/main'
        run: |
          # Read AdMob unit IDs from .env.production file
          ADMOB_BANNER_ANDROID=$(grep "^ADMOB_BANNER_UNIT_ID_ANDROID=" .env.production | cut -d '=' -f2)
          ADMOB_INTERSTITIAL_ANDROID=$(grep "^ADMOB_INTERSTITIAL_UNIT_ID_ANDROID=" .env.production | cut -d '=' -f2)
          ADMOB_REWARDED_ANDROID=$(grep "^ADMOB_REWARDED_UNIT_ID_ANDROID=" .env.production | cut -d '=' -f2)
          
          # Export as environment variables for the build script
          echo "ADMOB_BANNER_UNIT_ID=$ADMOB_BANNER_ANDROID" >> $GITHUB_ENV
          echo "ADMOB_INTERSTITIAL_UNIT_ID=$ADMOB_INTERSTITIAL_ANDROID" >> $GITHUB_ENV
          echo "ADMOB_REWARDED_UNIT_ID=$ADMOB_REWARDED_ANDROID" >> $GITHUB_ENV

      - name: Build and distribute Android app
        env:
          ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
        run: |
          cd packages/mobile
          ./distribute-android.sh ${{ github.event.inputs.build_type || 'debug' }} "${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"

      - name: Clean up service account key
        if: always()
        run: rm -f packages/mobile/android/app/service-account-key.json