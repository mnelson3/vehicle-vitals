name: 'Setup Node.js'
description: 'Setup Node.js with npm caching'

inputs:
  node-version:
    description: 'Node.js version to install'
    required: true
    default: '18'

runs:
  using: 'composite'
  steps:
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci
      shell: bash
      working-directory: packages/web