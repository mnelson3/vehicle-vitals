version: '3.8'

services:
  github-runner:
    image: myoung34/github-runner:latest
    container_name: vehicle-vitals-runner
    env_file:
      - .env.runner
    environment:
      REPO_URL: https://github.com/mnelson3/vehicle-vitals
      RUNNER_NAME: vehicle-vitals-docker-runner
      RUNNER_TOKEN: ${RUNNER_TOKEN}
      RUNNER_WORKDIR: /tmp/runner/work
      LABELS: self-hosted,ubuntu-latest,docker,vehicle-vitals
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-work:/tmp/runner/work
      - /tmp:/tmp
    networks:
      - runner-network
    restart: unless-stopped

  # Optional: Runner with GPU support (uncomment if needed)
  # github-runner-gpu:
  #   image: myoung34/github-runner:latest
  #   container_name: vehicle-vitals-runner-gpu
  #   environment:
  #     REPO_URL: https://github.com/mnelson3/vehicle-vitals
  #     RUNNER_NAME: docker-runner-gpu-${HOSTNAME:-local}
  #     RUNNER_TOKEN: ${RUNNER_TOKEN}
  #     RUNNER_WORKDIR: /tmp/runner/work
  #     LABELS: self-hosted,ubuntu-latest,docker,vehicle-vitals,gpu
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - runner-work:/tmp/runner/work
  #     - /tmp:/tmp
  #   networks:
  #     - runner-network
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # Monitoring container (optional)
  runner-monitor:
    image: nginx:alpine
    container_name: vehicle-vitals-runner-monitor
    ports:
      - "8081:80"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./monitoring/status.html:/usr/share/nginx/html/index.html:ro
    networks:
      - runner-network
    restart: unless-stopped
    depends_on:
      - github-runner

volumes:
  runner-work:
    driver: local

networks:
  runner-network:
    driver: bridge